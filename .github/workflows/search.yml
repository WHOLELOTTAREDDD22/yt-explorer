name: YouTube Search

on:
  workflow_dispatch:
    inputs:
      query:
        description: 'Search query for YouTube'
        required: true
        type: string

jobs:
  search:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install youtube-sr

      - name: Run search script
        run: node src/search.js "${{ github.event.inputs.query }}"

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/search_results/
          git diff --cached --quiet || {
            git commit -m "🔍 Search results: ${{ github.event.inputs.query }}"
            git push
          }
