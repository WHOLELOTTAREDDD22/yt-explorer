# .github/workflows/clean-data.yml
name: Clean Data

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "DELETE" to confirm'
        required: true
        type: string

jobs:
  clean:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "DELETE" ]; then
            echo "❌ Confirmation failed. You must type 'DELETE' to proceed."
            exit 1
          fi
          echo "✅ Confirmation verified"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run cleanup script
        run: node src/clean.js

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if ! git diff --cached --quiet; then
            git commit -m "🗑️ Clean all search data"
            git push
          else
            echo "No changes to commit"
          fi
